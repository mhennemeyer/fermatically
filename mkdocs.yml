site_name: "fermatically"
site_description: "Von elementarer Schulmathematik bis zu den großen Beweisen: Fermat, Poincaré und mehr."
site_url: "https://fermatically.com"
repo_url: "https://github.com/mhennemeyer/fermatically"
repo_name: "mhennemeyer/fermatically"

dev_addr: "127.0.0.1:8100"

docs_dir: docs

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Dunkles Design
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Helles Design
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.integrate
    - search.highlight
    - content.code.copy
    - content.tooltips

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: de
          name: Deutsch
          build: true
        - locale: en
          name: English
          build: true
          default: true
          site_name: "fermatically"
          site_description: "From elementary school mathematics to the great proofs: Fermat, Poincaré and more."
          nav_translations:
