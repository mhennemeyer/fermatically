site_name: "fermatically"
site_description: "Von elementarer Schulmathematik bis zu den großen Beweisen: Fermat, Poincaré und mehr."
site_url: "https://fermatically.com"
repo_url: "https://github.com/mhennemeyer/fermatically"
repo_name: "mhennemeyer/fermatically"

dev_addr: "127.0.0.1:8100"

docs_dir: docs

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Dunkles Design
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Helles Design
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.integrate
    - search.highlight
    - content.code.copy
    - content.tooltips

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: de
          name: Deutsch
          build: true
        - locale: en
          name: English
          build: true
          default: true
          site_name: "fermatically"
          site_description: "From elementary school mathematics to the great proofs: Fermat, Poincaré and more."
          nav_translations:
            Startseite: Home
            Über das Projekt: About
            Vorwissen: Prerequisites
            Überblick: Overview
            Übersicht: Overview
            Logik und Beweistechniken: Logic and Proof Techniques
            "Aussagenlogik": "Propositional Logic"
            "Implikation und Äquivalenz": "Implication and Equivalence"
            "Beweisarten": "Types of Proof"
            "Was ist ein Beweis?": "What Is a Proof?"
            Arithmetik und Zahlen: Arithmetic and Numbers
            "Bruchrechnung": "Fractions"
            "Gleichungen und äquivalente Umformungen": "Equations and Equivalent Transformations"
            "Ungleichungen": "Inequalities"
            "Teilbarkeit und ggT": "Divisibility and GCD"
            "Primfaktorzerlegung": "Prime Factorization"
            "Modulare Arithmetik": "Modular Arithmetic"
            "Komplexe Zahlen": "Complex Numbers"
            Mengen und Strukturen: Sets and Structures
            "Mengen und Mengenoperationen": "Sets and Set Operations"
            "Abbildungen (Funktionen)": "Mappings (Functions)"
            "Relationen und Äquivalenzklassen": "Relations and Equivalence Classes"
            "Zahlenbereiche": "Number Systems"
            Geometrie: Geometry
            "Pythagoras und pythagoräische Tripel": "Pythagoras and Pythagorean Triples"
            "Koordinatengeometrie": "Coordinate Geometry"
            Algebra: Algebra
            "Potenzen und Polynome": "Powers and Polynomials"
            "Binomische Formeln und Faktorisierung": "Binomial Formulas and Factoring"
            "Summen- und Produktnotation": "Summation and Product Notation"
            "Kombinatorik": "Combinatorics"
            Analysis: Analysis
            "Grenzwerte und Konvergenz": "Limits and Convergence"
            Grundlagen: Foundations
            Elementare Zahlentheorie: Elementary Number Theory
            "Was ist Fermats letzter Satz?": "What Is Fermat's Last Theorem?"
            "Der Beweis für n=4": "The Proof for n=4"
            "Primzahlen und warum sie reichen": "Primes and Why They Suffice"
            "Der Beweis für n=3": "The Proof for n=3"
            Werkzeuge: Tools
            "Gruppen – Symmetrie als Sprache": "Groups – Symmetry as Language"
            "Ringe und Körper": "Rings and Fields"
            "Galois-Theorie": "Galois Theory"
            "p-adische Zahlen": "p-adic Numbers"
            "Elliptische Kurven": "Elliptic Curves"
            "Modulformen": "Modular Forms"
            "Fermats letzter Satz": "Fermat's Last Theorem"
            "Der Beweis": "The Proof"
            "Die Taniyama-Shimura-Vermutung": "The Taniyama-Shimura Conjecture"
            "Freys Idee und Ribets Theorem": "Frey's Idea and Ribet's Theorem"
            "Galois-Darstellungen": "Galois Representations"
            "Deformationstheorie": "Deformation Theory"
            "R = T – Das Herz des Beweises": "R = T – The Heart of the Proof"
            "Der Taylor-Wiles-Trick": "The Taylor-Wiles Trick"
            "Der 3-5-Switch und der Abschluss": "The 3-5 Switch and the Conclusion"
            "Was danach kam": "What Came After"
            Quellen: Sources

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - admonition
  - toc:
      permalink: true
  - attr_list
  - def_list
  - meta
  - abbr
  - pymdownx.snippets:
      auto_append:
        - docs/includes/glossary.md

not_in_nav: |
  includes/

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Startseite: index.md
  - Über das Projekt: about.md
  - Fermats letzter Satz:
    - Überblick: flt-overview.md
    - Elementare Zahlentheorie:
      - "Was ist Fermats letzter Satz?": grundlagen/elementare-zahlentheorie/01-was-ist-flt.md
      - "Der Beweis für n=4": grundlagen/elementare-zahlentheorie/02-beweis-n4.md
      - "Primzahlen und warum sie reichen": grundlagen/elementare-zahlentheorie/03-primzahlen-reduktion.md
      - "Der Beweis für n=3": grundlagen/elementare-zahlentheorie/04-beweis-n3.md
    - Der Beweis:
      - Überblick: fermat-wiles/index.md
      - "Die Taniyama-Shimura-Vermutung": fermat-wiles/01-taniyama-shimura.md
      - "Freys Idee und Ribets Theorem": fermat-wiles/02-frey-ribet.md
      - "Galois-Darstellungen": fermat-wiles/03-galois-darstellungen.md
      - "Deformationstheorie": fermat-wiles/04-deformationstheorie.md
      - "R = T – Das Herz des Beweises": fermat-wiles/05-r-gleich-t.md
      - "Der Taylor-Wiles-Trick": fermat-wiles/06-taylor-wiles-trick.md
      - "Der 3-5-Switch und der Abschluss": fermat-wiles/07-3-5-switch.md
      - "Was danach kam": fermat-wiles/08-was-danach-kam.md
  - Werkzeuge:
    - Überblick: werkzeuge/index.md
    - "Gruppen – Symmetrie als Sprache": werkzeuge/gruppen.md
    - "Ringe und Körper": werkzeuge/ringe-koerper.md
    - "Galois-Theorie": werkzeuge/galois-theorie.md
    - "p-adische Zahlen": werkzeuge/p-adische-zahlen.md
    - "Elliptische Kurven": werkzeuge/elliptische-kurven.md
    - "Modulformen": werkzeuge/modulformen.md
  - Vorwissen:
    - Übersicht: vorwissen/index.md
    - Logik und Beweistechniken:
      - "Aussagenlogik": vorwissen/aussagenlogik.md
      - "Implikation und Äquivalenz": vorwissen/implikation-aequivalenz.md
      - "Beweisarten": vorwissen/beweisarten.md
      - "Was ist ein Beweis?": vorwissen/was-ist-ein-beweis.md
    - Arithmetik und Zahlen:
      - "Bruchrechnung": vorwissen/bruchrechnung.md
      - "Gleichungen und äquivalente Umformungen": vorwissen/gleichungen.md
      - "Ungleichungen": vorwissen/ungleichungen.md
      - "Teilbarkeit und ggT": vorwissen/teilbarkeit-ggt.md
      - "Primfaktorzerlegung": vorwissen/primfaktorzerlegung.md
      - "Modulare Arithmetik": vorwissen/modulare-arithmetik.md
      - "Komplexe Zahlen": vorwissen/komplexe-zahlen.md
    - Mengen und Strukturen:
      - "Mengen und Mengenoperationen": vorwissen/mengen.md
      - "Abbildungen (Funktionen)": vorwissen/abbildungen.md
      - "Relationen und Äquivalenzklassen": vorwissen/relationen-aequivalenzklassen.md
      - "Zahlenbereiche": vorwissen/zahlenbereiche.md
    - Geometrie:
      - "Pythagoras und pythagoräische Tripel": vorwissen/pythagoras.md
      - "Koordinatengeometrie": vorwissen/koordinatengeometrie.md
    - Algebra:
      - "Potenzen und Polynome": vorwissen/potenzen-polynome.md
      - "Binomische Formeln und Faktorisierung": vorwissen/binomische-formeln.md
      - "Summen- und Produktnotation": vorwissen/summen-produktnotation.md
      - "Kombinatorik": vorwissen/kombinatorik.md
    - Analysis:
      - "Grenzwerte und Konvergenz": vorwissen/grenzwerte-konvergenz.md
  - Quellen: quellen.md
